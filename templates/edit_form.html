<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Edit — Finance Tracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="topbar">
  <div class="topbar-brand">◈ <span>Finance</span></div>
  <div class="topbar-links">
    <a href="/">Dashboard</a>
  </div>
</header>

<div class="standalone">
  <div class="standalone-header">
    <div class="standalone-title">Edit {{ edit_type|capitalize }}</div>
    <a href="{{ back_url }}" class="btn-back">← Back</a>
  </div>

  <div class="scard">
    <h2>Update Details</h2>
    <form method="post">
      <div class="form-g2" style="margin-bottom:14px;">
        <div class="sf">
          <label>Date</label>
          <input type="date" name="date" value="{{ item.date }}" required>
        </div>
        <div class="sf">
          <label>Category</label>
          <select name="category" required>
            {% for c in categories %}
              <option value="{{ c }}" {% if c == item.category %}selected{% endif %}>{{ c }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="sf" style="margin-bottom:14px;">
        <label>Description</label>
        <input type="text" name="description" value="{{ item.description }}" required>
      </div>
      <div class="sf" style="margin-bottom:20px;">
        <label>Amount ($)</label>
        <input type="number" name="amount" min="0" step="0.01" value="{{ item.amount }}" inputmode="decimal" required>
      </div>
      <div style="display:flex; gap:10px;">
        <button type="submit" class="btn-save">Save Changes</button>
        <a href="{{ back_url }}" class="btn-back">Cancel</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
