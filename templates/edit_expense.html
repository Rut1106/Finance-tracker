<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Edit Expense — Finance Tracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="topbar">
  <div class="topbar-brand">Finance Tracker</div>
  <nav class="topbar-nav">
    <a href="/">Dashboard</a>
  </nav>
</header>

<div class="page-wrap" style="max-width:500px;">
  <div class="page-header">
    <div class="page-title">Edit Expense</div>
    <a href="/" class="btn-back">← Back</a>
  </div>

  <div class="standalone-card">
    <h2>Update Details</h2>
    <form method="post">
      <div class="form-grid-2">
        <div class="standalone-field">
          <label>Date</label>
          <input type="date" name="date" value="{{ expense.date }}" required>
        </div>
        <div class="standalone-field">
          <label>Category</label>
          <select name="category" required>
            {% for c in categories %}
              <option value="{{ c }}" {% if c == expense.category %}selected{% endif %}>{{ c }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="standalone-field" style="margin-top:12px;">
        <label>Description</label>
        <input type="text" name="description" value="{{ expense.description }}" required>
      </div>
      <div class="standalone-field" style="margin-top:12px;">
        <label>Amount ($)</label>
        <input type="number" name="amount" min="0" step="0.01" value="{{ expense.amount }}" required>
      </div>
      <div style="display:flex; gap:10px; margin-top:16px;">
        <button type="submit" class="btn-save">Save Changes</button>
        <a href="/" class="btn-back">Cancel</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
