<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Expense Tracker - Edit Expense</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <div class="container">

      <div class="header">
        <h1>Edit Expense</h1>
        <a href="/" class="btn btn-secondary">Back to Dashboard</a>
      </div>

      <div class="card">
        <h2>Update Expense Details</h2>
        <form method="post">
          <div class="form-grid">
            <div class="form-group">
              <label for="date">Date</label>
              <input type="date" id="date" name="date" value="{{ expense.date }}" required>
            </div>
            <div class="form-group">
              <label for="category">Category</label>
              <select id="category" name="category" required>
                {% for category in categories %}
                  <option value="{{ category }}" {% if category == expense.category %}selected{% endif %}>{{ category }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="form-group full-width">
              <label for="description">Description</label>
              <input type="text" id="description" name="description" value="{{ expense.description }}" required>
            </div>
            <div class="form-group">
              <label for="amount">Amount ($)</label>
              <input type="number" id="amount" name="amount" min="0" step="0.01" value="{{ expense.amount }}" required>
            </div>
            <div class="form-group" style="justify-content: flex-end;">
              <div class="form-actions">
                <a href="/" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Changes</button>
              </div>
            </div>
          </div>
        </form>
      </div>

    </div>
  </body>
</html>
