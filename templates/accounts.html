<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Manage Accounts</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <div class="container">

      <div class="header">
        <h1>Manage Account Balances</h1>
        <a href="/" class="btn btn-secondary">Back to Dashboard</a>
      </div>

      <div class="card">
        <h2>Set Opening Balances</h2>
        <form method="post">
          <div class="form-grid">
            {% for name, balance in accounts.items() %}
              <div class="form-group">
                <label for="{{ name }}">{{ name }}</label>
                <input type="number" id="{{ name }}" name="{{ name }}" min="0" step="0.01" value="{{ balance }}" required>
              </div>
            {% endfor %}
            <div class="form-group full-width" style="justify-content: flex-end; align-items: flex-end;">
              <button type="submit" class="btn btn-primary">Save Balances</button>
            </div>
          </div>
        </form>
      </div>

    </div>
  </body>
</html>
